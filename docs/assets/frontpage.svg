  <text x="333" y="606" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="19" font-weight="700" fill="#F8FAFC">Materialize Schema</text>
  <rect x="460" y="572" width="188" height="54" rx="27" fill="#12203D" stroke="#334155"/>
  <text x="554" y="606" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="19" font-weight="700" fill="#C7D2FE">Launch Modeller</text>

