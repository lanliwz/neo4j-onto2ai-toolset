    <circle cx="655" cy="409" r="12" fill="#14B8A6"/>
    <circle cx="728" cy="472" r="12" fill="#38BDF8"/>
    <circle cx="596" cy="518" r="12" fill="#F59E0B"/>
    <circle cx="516" cy="432" r="12" fill="#5B5AF7"/>
    <path d="M699 329L655 409L728 472L596 518L516 432L655 409L596 518" stroke="#64748B" stroke-width="2.5" stroke-linecap="round"/>
    <text x="553" y="355" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" fill="#CBD5E1">graph-native schema</text>
  </g>

  <g opacity="0.72">
    <rect x="223" y="228" width="132" height="28" rx="14" fill="#102043" stroke="#334155"/>
    <text x="289" y="247" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#A5B4FC">ONTOLOGY OPS</text>
