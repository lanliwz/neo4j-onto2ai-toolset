<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Onto2AI Engineer Frontpage</title>
  <desc id="desc">A dark, graph-inspired landing illustration for Onto2AI Engineer showing ontology nodes, staging workflow, and modeller panels.</desc>
  <defs>
    <linearGradient id="bg" x1="140" y1="60" x2="1440" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="0.52" stop-color="#121A33"/>
      <stop offset="1" stop-color="#0A1327"/>
    </linearGradient>
    <linearGradient id="violet" x1="277" y1="183" x2="1235" y2="691" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5B5AF7"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="teal" x1="465" y1="262" x2="1019" y2="648" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="amber" x1="947" y1="254" x2="1150" y2="438" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <filter id="blurGlow" x="-200" y="-200" width="2000" height="1300" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="panelShadow" x="140" y="102" width="1320" height="670" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#020617" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.55" filter="url(#blurGlow)">
    <circle cx="268" cy="170" r="122" fill="#5B5AF7"/>
    <circle cx="1272" cy="194" r="146" fill="#0EA5E9"/>
    <circle cx="1040" cy="732" r="180" fill="#14B8A6"/>
  </g>

  <g opacity="0.18" stroke="#94A3B8">
    <path d="M0 154H1600"/>
    <path d="M0 294H1600"/>
    <path d="M0 434H1600"/>
    <path d="M0 574H1600"/>
    <path d="M0 714H1600"/>
    <path d="M188 0V900"/>
    <path d="M468 0V900"/>
    <path d="M748 0V900"/>
    <path d="M1028 0V900"/>
    <path d="M1308 0V900"/>
  </g>

  <g filter="url(#panelShadow)">
    <rect x="171" y="132" width="1258" height="610" rx="28" fill="#0F172A" fill-opacity="0.68" stroke="#FFFFFF" stroke-opacity="0.18"/>
  </g>

  <rect x="171" y="132" width="1258" height="610" rx="28" fill="url(#bg)" fill-opacity="0.28"/>
  <rect x="171" y="132" width="1258" height="76" rx="28" fill="#111827" fill-opacity="0.82"/>
  <rect x="171" y="180" width="1258" height="1" fill="#334155" fill-opacity="0.7"/>
  <circle cx="220" cy="170" r="8" fill="#FB7185"/>
  <circle cx="250" cy="170" r="8" fill="#F59E0B"/>
  <circle cx="280" cy="170" r="8" fill="#10B981"/>

