  <text x="1113" y="174" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#CBD5E1">GPT-5.2</text>
  <rect x="1200" y="154" width="184" height="31" rx="15.5" fill="#0F1B38" stroke="#5B5AF7" stroke-opacity="0.45"/>
  <text x="1292" y="174" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#E2E8F0">stagingdb ready</text>

  <text x="223" y="384" font-family="Georgia, Times New Roman, serif" font-size="78" font-weight="700" fill="#F8FAFC">Onto2AI</text>
  <text x="223" y="460" font-family="Georgia, Times New Roman, serif" font-size="78" font-weight="700" fill="#F8FAFC">Engineer</text>
  <text x="226" y="523" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="500" fill="#A5B4FC">Ontology to implementation, with staging, tooling, and modeller in one graph-native workflow.</text>

