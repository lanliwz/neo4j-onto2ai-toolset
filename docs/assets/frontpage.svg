    <rect x="872" y="255" width="466" height="64" rx="26" fill="#111827"/>
    <text x="914" y="294" font-family="Inter, Segoe UI, sans-serif" font-size="22" font-weight="700" fill="#E2E8F0">Modeller</text>

    <rect x="904" y="344" width="124" height="72" rx="18" fill="#182847" stroke="#4F46E5"/>
    <text x="966" y="371" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#E0E7FF">client</text>
    <text x="966" y="394" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#A5B4FC">owl:Class</text>

    <rect x="1098" y="368" width="142" height="80" rx="18" fill="#182847" stroke="#4F46E5"/>
    <text x="1169" y="398" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="19" font-weight="700" fill="#E0E7FF">account</text>
    <text x="1169" y="422" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#A5B4FC">customer account</text>

    <rect x="983" y="495" width="180" height="72" rx="18" fill="#0F2A2B" stroke="#14B8A6"/>
    <text x="1073" y="523" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="16" font-weight="700" fill="#CCFBF1">isSalesRepresentativeOf</text>
    <text x="1073" y="546" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" fill="#99F6E4">object property</text>

    <path d="M1028 380C1056 380 1068 380 1098 392" stroke="url(#violet)" stroke-width="4" stroke-linecap="round"/>
    <path d="M1112 446C1106 468 1096 479 1082 495" stroke="url(#teal)" stroke-width="4" stroke-linecap="round"/>
    <path d="M1007 416C1018 446 1035 470 1053 495" stroke="url(#teal)" stroke-width="4" stroke-linecap="round"/>

    <rect x="1229" y="286" width="76" height="28" rx="14" fill="url(#amber)"/>
    <text x="1267" y="305" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="12" font-weight="700" fill="#111827">LIVE</text>
  </g>

  <g opacity="0.96">
    <rect x="796" y="132" width="1" height="610" fill="#334155" fill-opacity="0.6"/>
    <rect x="739" y="618" width="552" height="86" rx="22" fill="#0C1529" stroke="#1E293B"/>
    <text x="776" y="651" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#F8FAFC">Workflow</text>
    <text x="776" y="678" font-family="Inter, Segoe UI, sans-serif" font-size="15" fill="#94A3B8">load ontology  ->  materialize schema  ->  stage classes  ->  review in modeller</text>
